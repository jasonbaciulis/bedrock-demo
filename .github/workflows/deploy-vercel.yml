name: Deploy to Vercel

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Build SSG and deploy to Vercel
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

    steps:
      - uses: actions/checkout@v6

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          extensions: dom, curl, libxml, mbstring, zip, intl, gd, bcmath
          coverage: none

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm

      - name: Prepare .env
        env:
          APP_URL: ${{ vars.APP_URL }}
        run: |
          if [ -z "$APP_URL" ]; then
            echo "::error::Set the APP_URL repository variable (Settings → Variables → Actions)."
            exit 1
          fi
          cp .env.example .env
          sed -i \
            -e "s|^APP_ENV=.*|APP_ENV=production|" \
            -e "s|^APP_DEBUG=.*|APP_DEBUG=false|" \
            -e "s|^APP_URL=.*|APP_URL=${APP_URL}|" \
            -e "s|^APP_KEY=.*|APP_KEY=base64:$(openssl rand -base64 32)|" \
            -e "s|^STATAMIC_PRO_ENABLED=.*|STATAMIC_PRO_ENABLED=false|" \
            .env

      - uses: ramsey/composer-install@v4
        with:
          dependency-versions: locked
          composer-options: --no-progress --prefer-dist --no-dev --optimize-autoloader

      - run: npm ci
      - run: npm run build

      - name: Generate static site
        run: |
          php please stache:warm -n -q
          php please ssg:generate -n
          [ -d storage/app/static ] && [ -n "$(ls -A storage/app/static)" ] \
            || { echo "::error::SSG produced no output"; exit 1; }

      - name: Deploy to Vercel
        run: |
          npm install --global vercel@latest
          mkdir -p .vercel/output/static
          cp -R storage/app/static/. .vercel/output/static/
          printf '{"version":3}\n' > .vercel/output/config.json
          vercel pull --yes --environment=production
          vercel deploy --prebuilt --prod
