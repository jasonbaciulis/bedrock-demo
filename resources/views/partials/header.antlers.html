<div
    class="relative bg-white"
    x-data="{
        mobileNavOpen: false,
    }"
>
    <div class="container">
        <div class="flex items-center justify-between py-6 md:justify-start md:gap-x-10">
            <div class="flex flex-1">
                <s:partial:components.logo :logo="theme:logo" class="inline-flex h-8 w-40" />
            </div>
            <div class="-my-2 -mr-2 lg:hidden">
                <button
                    type="button"
                    class="btn btn--ghost btn--square"
                    :aria-expanded="mobileNavOpen"
                    @click.prevent="mobileNavOpen = !mobileNavOpen"
                    aria-label="Open menu"
                >
                    <s:svg src="lucide/menu" class="size-5" />
                </button>
            </div>

            <s:partial:partials.nav-header-desktop />

            <div class="hidden items-center justify-end gap-x-2 lg:flex lg:w-0 lg:flex-1">
                {{ theme:header_buttons }}
                    <s:partial:components.ui.button
                        :variant="variant"
                        :link_type="link_type"
                        :url="url"
                        :entry="entry"
                        :email="email"
                        :phone="phone"
                        :asset="asset"
                        :code="code"
                        :target_blank="target_blank"
                        :label="label"
                    />
                {{ /theme:header_buttons }}
            </div>
        </div>
    </div>

    {{# Hidden from lg and up #}}
    <s:partial:partials.nav-header-mob />
</div>
