{{ once }}
    {{ push:scripts }}
        <s:vite src="resources/css/lite-yt-embed.css" />
        <s:vite src="resources/js/lite-yt-embed.js" />
    {{ /push:scripts }}
{{ /once }}
<figure class="not-prose my-0">
    <lite-youtube
        videoid="{{ youtube_id }}"
        style="background-image: url('https://i.ytimg.com/vi/{{ youtube_id }}/hqdefault.jpg')"
        class="!max-w-none"
    >
        <a href="{{ youtube_url }}" class="lty-playbtn" title="Play Video">
            <span class="lyt-visually-hidden">Play Video</span>
        </a>
    </lite-youtube>
    {{ if caption }}
        <figcaption class="text-muted-foreground mt-2 block text-sm">{{ caption }}</figcaption>
    {{ /if }}
</figure>
