---
fetched_from_rest_api: false
class: ''
---

<figure class="bg-primary-foreground {{ view:class }} rounded-2xl p-8 text-sm/6">
    <blockquote class="text-neutral-900">
        {{ if view:fetched_from_rest_api }}
            <p x-html="`“${entry.quote}”`"></p>
        {{ else }}
            <p>“{{ quote }}”</p>
        {{ /if }}
    </blockquote>
    <figcaption class="mt-6 flex items-center gap-x-4">
        {{ if view:fetched_from_rest_api }}
            <div class="bg-primary-foreground size-10 shrink-0 overflow-hidden rounded-full">
                <img
                    :src="`${entry.avatar.url}`"
                    :alt="`${entry.title}'s avatar`"
                    loading="lazy"
                    class="size-full object-cover"
                />
            </div>
        {{ else }}
            <s:partial:components.ui.avatar
                :image="avatar"
                w="40"
                h="40"
                class="size-10"
                :name="title"
            />
        {{ /if }}
        <div>
            {{ if view:fetched_from_rest_api }}
                <p class="font-semibold text-neutral-900" x-text="entry.title"></p>
                <p class="text-muted-foreground" x-text="entry.author_title"></p>
            {{ else }}
                <p class="font-semibold text-neutral-900">{{ title }}</p>
                <p class="text-muted-foreground">{{ author_title }}</p>
            {{ /if }}
        </div>
    </figcaption>
</figure>
