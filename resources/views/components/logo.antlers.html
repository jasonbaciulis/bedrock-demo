---
logo: ''
url: ''
aria_label: ''
class: ''
---

{{# Set the logo inside Control Panel in /cp/globals/theme #}}

<a
    href="{{ view:url ? view:url : config:app:url }}"
    aria-label="{{ view:aria_label ? view:aria_label : '{config:app:name} logo' }}"
    {{ view:class | attribute:class }}
>
    <s:svg :src="view:logo" />
</a>
