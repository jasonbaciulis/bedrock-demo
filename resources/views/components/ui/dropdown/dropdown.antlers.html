---
alignment: 'left'
width: 'w-56'
class: ''
toggle_class: ''
content_class: ''
---

<div
    x-data="{
        open: false,
        toggle() {
            if (this.open) {
                return this.close()
            }
            this.$refs.button.focus()
            this.open = true
        },
        close(focusAfter) {
            if (!this.open) return
            this.open = false
            focusAfter && focusAfter.focus()
        },
    }"
    @keydown.escape.prevent.stop="close($refs.button)"
    @focusin.window="!$refs.panel.contains($event.target) && close()"
    x-id="['dropdown-menu']"
    class="{{ view:class }} relative"
>
    <button
        x-ref="button"
        @click="toggle()"
        :aria-expanded="open"
        :aria-controls="$id('dropdown-menu')"
        x-id="['dropdown-button']"
        class="btn {{ view:toggle_class }}"
    >
        {{ slot:toggle }}
    </button>
    <div
        x-cloak
        x-ref="panel"
        x-show="open"
        x-trap="open"
        x-transition:enter="ease transition duration-100"
        x-transition:enter-start="scale-95 opacity-0"
        x-transition:enter-end="scale-100 opacity-100"
        x-transition:leave="ease transition duration-75"
        x-transition:leave-start="scale-100 opacity-100"
        x-transition:leave-end="scale-95 opacity-0"
        @click.outside="close($refs.button)"
        :id="$id('dropdown-menu')"
        :aria-labelledby="$id('dropdown-button')"
        tabindex="-1"
        class="bg-popover text-popover-foreground {{ ['left-0 origin-top-left' => view:alignment == 'left', 'right-0 origin-top-right' => view:alignment == 'right'] | classes }} {{ view:width }} {{ view:content_class }} absolute z-10 mt-1 max-h-60 overflow-x-hidden overflow-y-auto rounded-lg border p-1 shadow-md"
    >
        {{ slot:content }}
    </div>
</div>
