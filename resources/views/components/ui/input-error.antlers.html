---
handle: ''
id: ''
class: ''
---

<template x-if="form.invalid('{{ view:handle }}')">
    <p
        id="{{ view:id }}-error"
        role="alert"
        aria-live="polite"
        aria-atomic="true"
        class="text-destructive text-sm {{ view:class }}"
        x-text="form.errors.{{ view:handle }}">
    </p>
</template>
