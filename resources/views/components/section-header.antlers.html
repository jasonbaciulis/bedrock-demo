---
title: ''
text: ''
margin: 'mb-20'
class: ''
---

<div class="{{ view:margin }} {{ view:class }} mx-auto max-w-xl text-center">
    <h2 class="h2 text-pretty">{{ view:title }}</h2>
    {{ if view:text }}
        <p class="text-muted-foreground mt-6 text-lg text-pretty">{{ view:text }}</p>
    {{ /if }}
</div>
